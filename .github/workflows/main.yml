name: Deploy from DigitalOcean snapshot

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DO_API: https://api.digitalocean.com/v2

    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq sshpass

      - name: Create droplet from snapshot
        id: create
        env:
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          DROPLET_NAME: ${{ secrets.DO_DROPLET_NAME }}
          REGION: ${{ secrets.DO_REGION }}
          SIZE: ${{ secrets.DO_SIZE }}
          SNAPSHOT_ID: ${{ secrets.DO_SNAPSHOT_ID }}
          DO_SSH_KEY_ID: ${{ secrets.DO_SSH_KEY_ID }}
        run: |
          set -euo pipefail

          RESPONSE=$(curl -sS -X POST "$DO_API/droplets" \
            -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"${DROPLET_NAME}\",
              \"region\": \"${REGION}\",
              \"size\": \"${SIZE}\",
              \"image\": \"${SNAPSHOT_ID}\",
              \"ipv6\": false,
              \"monitoring\": false,
              \"ssh_keys\": [${DO_SSH_KEY_ID}]
            }")

          echo "$RESPONSE"

          DROPLET_ID=$(echo "$RESPONSE" | jq -r '.droplet.id // empty')
          if [ -z "$DROPLET_ID" ]; then
            echo "Failed to create droplet"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          echo "droplet_id=$DROPLET_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for droplet to become active and get IP
        id: wait
        env:
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          DROPLET_ID: ${{ steps.create.outputs.droplet_id }}
        run: |
          set -euo pipefail

          for i in {1..60}; do
            RESPONSE=$(curl -sS \
              -H "Authorization: Bearer $DO_TOKEN" \
              "$DO_API/droplets/${DROPLET_ID}")

            STATUS=$(echo "$RESPONSE" | jq -r '.droplet.status // empty')
            IP=$(echo "$RESPONSE" | jq -r '.droplet.networks.v4[]? | select(.type=="public") | .ip_address' | head -n1)

            echo "Attempt $i: status=${STATUS:-unknown} ip=${IP:-none}"

            if [ "$STATUS" = "active" ] && [ -n "${IP:-}" ]; then
              echo "ip=$IP" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            sleep 10
          done

          echo "Droplet did not become active in time"
          exit 1

      - name: Wait for SSH
        env:
          HOST: ${{ steps.wait.outputs.ip }}
          USERNAME: root
          PASSWORD: ${{ secrets.DROPLET_PASSWORD }}
        run: |
          set -euo pipefail

          for i in {1..30}; do
            if sshpass -p "$PASSWORD" ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=10 \
              "$USERNAME@$HOST" "echo SSH OK"; then
              exit 0
            fi

            echo "SSH not ready yet, retry $i"
            sleep 10
          done

          echo "SSH did not become available"
          exit 1

      - name: Install apps over SSH
        env:
          HOST: ${{ steps.wait.outputs.ip }}
          USERNAME: root
          PASSWORD: ${{ secrets.DROPLET_PASSWORD }}
        run: |
          set -euo pipefail
      
          sshpass -p "$PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "$USERNAME@$HOST" \
            "set -euo pipefail && \
             printf 'Administrator\n${PASSWORD}\n' | univention-app install nextcloud && \
             yes | univention-install univention-appcenter-dev && \
             yes | univention-app dev-use-test-appcenter && \
             yes | univention-app install onlyoffice-ds"

      - name: Show IP
        run: |
          echo "Droplet IP: ${{ steps.wait.outputs.ip }}"
